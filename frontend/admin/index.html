<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tekzivo Admin Portal</title>
  <link rel="icon" type="image/png" href="../logo.png" />
  <script>
    // Apply theme early to prevent FOUC (flash of unstyled content)
    (function () {
      const theme = localStorage.getItem('TEKZIVO_THEME') || 'light';
      if (theme === 'dark') {
        document.documentElement.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
      }
    })();
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --blue-dark: #0a1a6e;
      --blue: #1533b8;
      --blue-mid: #1e45d4;
      --blue-light: #2d67f5;
      --gold: #f5a623;
      --bg: #f0f2f8;
      --sidebar-bg: #0d1f7c;
      --white: #fff;
      --text: #1a2340;
      --muted: #6b7a99;
      --border: #e0e5f0;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --warning: #b45309;
      --warning-bg: #fef9c3;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --info: #1d4ed8;
      --info-bg: #dbeafe;
      --pending: #7c3aed;
      --pending-bg: #ede9fe;
      --card-shadow: 0 2px 12px rgba(21, 51, 184, 0.08);
      --font-head: 'Nunito', sans-serif;
      --font-body: 'Poppins', sans-serif;

      /* ⚠️ Change this to your server URL when deploying */
      --api: "";
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      overflow-x: hidden
    }

    /* SIDEBAR */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 1.5rem 1.25rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08)
    }

    .sidebar-logo span {
      font-family: var(--font-head);
      font-size: 1.4rem;
      font-weight: 900;
      color: #fff
    }

    .sidebar-logo span em {
      color: var(--gold);
      font-style: normal
    }

    .sidebar-logo-img {
      height: 28px;
      width: auto;
      object-fit: contain;
      transition: transform 0.2s ease;
    }

    .sidebar-logo:hover .sidebar-logo-img {
      transform: scale(1.1) rotate(-4deg);
    }

    .sidebar-label {
      font-size: 0.65rem;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 1.25rem 1.25rem 0.4rem
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 0 0.75rem
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.65rem 0.75rem;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s
    }

    .nav-item:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff
    }

    .nav-item.active {
      background: var(--blue-light);
      color: #fff;
      font-weight: 600
    }

    .nav-icon {
      font-size: 1rem;
      width: 20px;
      text-align: center;
      flex-shrink: 0
    }

    .nav-badge {
      margin-left: auto;
      background: var(--gold);
      color: #000;
      font-size: 0.65rem;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 20px
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08)
    }

    .admin-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 0.75rem;
      color: #000
    }

    .admin-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff
    }

    .admin-role {
      font-size: 0.68rem;
      color: rgba(255, 255, 255, 0.45)
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 1.75rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .topbar-title {
      font-family: var(--font-head);
      font-size: 1.2rem;
      font-weight: 800
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem
    }

    .api-status {
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 700
    }

    .api-status.online {
      background: var(--success-bg);
      color: var(--success)
    }

    .api-status.offline {
      background: var(--danger-bg);
      color: var(--danger)
    }

    .btn-refresh {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
      color: var(--text);
    }

    .btn-refresh:hover {
      border-color: var(--blue);
      color: var(--blue)
    }

    .content {
      padding: 1.75rem;
      flex: 1
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.75rem
    }

    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
      font-weight: 500
    }

    .stat-value {
      font-family: var(--font-head);
      font-size: 1.75rem;
      font-weight: 900
    }

    .stat-sub {
      font-size: 0.7rem;
      margin-top: 4px;
      color: var(--muted)
    }

    .stat-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0
    }

    /* PANEL / TABLE */
    .panel {
      background: var(--white);
      border-radius: 14px;
      box-shadow: var(--card-shadow);
      border: 1px solid var(--border);
      overflow: hidden
    }

    .panel-header {
      padding: 1.1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem
    }

    .panel-title {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 800
    }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem
    }

    .search-box input {
      border: none;
      background: transparent;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      width: 180px
    }

    .filter-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      outline: none
    }

    .btn-export {
      background: var(--blue-light);
      color: #fff;
      border: none;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s
    }

    .btn-export:hover {
      background: var(--blue)
    }

    /* TABLE */
    .table-wrap {
      overflow-x: auto
    }

    .table-wrap-scroll {
      max-height: 450px;
      overflow-y: auto;
    }

    .table-wrap-scroll th {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 5;
      box-shadow: inset 0 -1px 0 var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px
    }

    thead {
      background: var(--bg)
    }

    th {
      padding: 0.75rem 1.25rem;
      text-align: left;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      white-space: nowrap
    }

    td {
      padding: 0.85rem 1.25rem;
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle
    }

    tr:last-child td {
      border-bottom: none
    }

    tr:hover td {
      background: rgba(21, 51, 184, 0.025)
    }

    .booking-id {
      font-family: monospace;
      font-size: 0.75rem;
      color: var(--muted)
    }

    .customer-cell {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .cust-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0
    }

    .cust-name {
      font-weight: 600;
      font-size: 0.82rem
    }

    .cust-phone {
      font-size: 0.7rem;
      color: var(--muted)
    }

    /* BADGES */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7
    }

    .badge-Pending {
      background: var(--pending-bg);
      color: var(--pending)
    }

    .badge-Confirmed {
      background: var(--info-bg);
      color: var(--info)
    }

    .badge-Completed {
      background: var(--success-bg);
      color: var(--success)
    }

    .badge-Cancelled {
      background: var(--danger-bg);
      color: var(--danger)
    }

    .badge-In.Progress,
    .badge-In {
      background: var(--warning-bg);
      color: var(--warning)
    }

    /* ACTION BUTTONS */
    .action-btns {
      display: flex;
      gap: 6px
    }

    .btn-sm {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      font-family: var(--font-body)
    }

    .btn-view {
      background: var(--info-bg);
      color: var(--info)
    }

    .btn-view:hover {
      background: var(--info);
      color: #fff
    }

    .btn-cancel-sm {
      background: var(--danger-bg);
      color: var(--danger)
    }

    .btn-cancel-sm:hover {
      background: var(--danger);
      color: #fff
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border)
    }

    .page-info {
      font-size: 0.78rem;
      color: var(--muted)
    }

    .page-btns {
      display: flex;
      gap: 6px
    }

    .page-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-body);
      transition: all 0.15s
    }

    .page-btn:hover {
      border-color: var(--blue);
      color: var(--blue)
    }

    .page-btn.active {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue)
    }

    /* LOADING SKELETON */
    .skeleton {
      background: linear-gradient(90deg, #e8edf8 25%, #f0f2f8 50%, #e8edf8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .skeleton-row td {
      padding: 1rem 1.25rem
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.45);
      align-items: center;
      justify-content: center
    }

    .modal-overlay.open {
      display: flex
    }

    .modal {
      background: var(--white);
      border-radius: 16px;
      width: 540px;
      max-width: 95vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .modal-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .modal-title {
      font-family: var(--font-head);
      font-size: 1.1rem;
      font-weight: 800
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--muted)
    }

    .modal-body {
      padding: 1.5rem;
      max-height: 70vh;
      overflow-y: auto
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem
    }

    .detail-item {}

    .detail-label {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 3px
    }

    .detail-value {
      font-size: 0.85rem;
      font-weight: 600
    }

    .detail-full {
      grid-column: 1/-1
    }

    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end
    }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      border: none;
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s
    }

    .btn-primary:hover {
      background: var(--blue-dark)
    }

    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer
    }

    .status-select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      outline: none
    }

    .status-select:focus {
      border-color: var(--blue-light)
    }

    /* BOTTOM GRID */
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1.25rem
    }

    .chart-bar-wrap {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 80px;
      margin-top: 0.75rem
    }

    .chart-bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      flex: 1
    }

    .chart-bar {
      width: 100%;
      border-radius: 4px 4px 0 0;
      background: var(--blue-light);
      opacity: 0.75;
      min-height: 4px;
      transition: opacity 0.15s
    }

    .chart-bar:hover {
      opacity: 1
    }

    .chart-label {
      font-size: 0.65rem;
      color: var(--muted)
    }

    .tech-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.65rem;
      border-radius: 8px;
      background: var(--bg);
      margin-top: 0.5rem
    }

    .tech-av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0
    }

    .tech-info {
      flex: 1
    }

    .tech-name {
      font-size: 0.8rem;
      font-weight: 600
    }

    .tech-spec {
      font-size: 0.7rem;
      color: var(--muted)
    }

    .tech-jobs-num {
      font-family: var(--font-head);
      font-size: 1rem;
      font-weight: 800;
      color: var(--blue)
    }

    .tech-jobs-lbl {
      font-size: 0.65rem;
      color: var(--muted);
      text-align: right
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 2000;
      background: var(--text);
      color: #fff;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      transform: translateY(100px);
      opacity: 0;
      transition: all 0.3s
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }

    /* Custom Confirmation Dialog */
    .confirm-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20000;
    }
    .confirm-overlay.active {
      display: flex;
    }
    .confirm-box {
      background: var(--white);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      text-align: center;
      font-family: var(--font-body);
    }
    .confirm-title {
      font-family: var(--font-head);
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text);
    }
    .confirm-message {
      color: var(--muted);
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .confirm-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .btn-confirm-yes {
      background: var(--danger);
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-confirm-yes:hover {
      background: #b91c1c;
    }
    .btn-confirm-no {
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn-confirm-no:hover {
      background: var(--border);
    }

    /* RESPONSIVE DESIGN - MOBILE DRAWER & TWEAKS */
    .menu-toggle {
      display: none;
    }
    .sidebar-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 9998;
    }
    .sidebar-overlay.active {
      display: block;
    }

    @media(max-width:900px) {
      .menu-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text);
        margin-right: 12px;
        width: 38px;
        height: 38px;
        border-radius: 8px;
        transition: background 0.2s;
      }
      .menu-toggle:hover {
        background: var(--bg);
      }
      
      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 250px !important;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 9999;
        box-shadow: 4px 0 15px rgba(0,0,0,0.15);
      }
      
      .sidebar.open {
        transform: translateX(0);

  <!-- API CONFIG — change this to your Flask server URL -->
  <script>
    const getApiBase = () => {
      const saved = localStorage.getItem('TEKZIVO_API_BASE');
      if (saved) return saved;
      return window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:5000/api'
        : 'https://karthikeyankasi.pythonanywhere.com/api';
    };
    const API_BASE = getApiBase();

    if (localStorage.getItem('TEKZIVO_THEME') === 'dark') {
      document.body.classList.add('dark-theme');

  </script>

  <script>
    // ─── STATE ────────────────────────────────
    let currentSection = 'dashboard';
    let currentBookingId = null;
    let currentDrawerBookingId = null;
    let bookingsCache = [];
    let techniciansCache = [];
    let statsCache = {};
    let currentPage = 1;
    const PER_PAGE = 15;

    const COLORS = ['#1533b8', '#7c3aed', '#0e7490', '#b45309', '#16a34a', '#dc2626', '#1d4ed8', '#d97706'];
    const initials = n => n.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const colorFor = n => COLORS[n.charCodeAt(0) % COLORS.length];

    // ─── API HELPERS ──────────────────────────
    async function apiFetch(path, opts = {}) {
      const res = await fetch(API_BASE + path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function updateApiStatusBadge(status) {
      const badge = document.getElementById('api-badge');
      if (!badge) return;
      if (status === 'online') {

    async function loadBookings() {

    function filterAndRenderTable() {
      const search = (document.getElementById('search-input')?.value || '').toLowerCase();
      const status = document.getElementById('status-filter')?.value || '';

      const filtered = bookingsCache.filter(b => {
        const cname = b.customer?.name || '';
        const cphone = b.customer?.phone || '';
        const ref = b.booking_ref || '';
        const matchS = !search || cname.toLowerCase().includes(search) ||
          cphone.includes(search) || ref.toLowerCase().includes(search);
        const matchF = !status || b.status === status;
        return matchS && matchF;
      });

      const total = filtered.length;
      const start = (currentPage - 1) * PER_PAGE;
      const page = filtered.slice(start, start + PER_PAGE);

      const tbody = document.getElementById('bookings-tbody');
      if (!tbody) return;

      if (!page.length) {
        tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">No bookings found</td></tr>`;

      if (pi) pi.textContent = `Showing ${start + 1}–${Math.min(start + PER_PAGE, total)} of ${total} bookings`;

    function filterAndRenderKanban() {
      const search = (document.getElementById('kanban-search-input')?.value || '').toLowerCase();

      const filtered = bookingsCache.filter(b => {
        const cname = b.customer?.name || '';
        const cphone = b.customer?.phone || '';
        const ref = b.booking_ref || '';
        return !search || cname.toLowerCase().includes(search) ||
          cphone.includes(search) || ref.toLowerCase().includes(search);
      });

      const statuses = ['Pending', 'Confirmed', 'In Progress', 'Completed', 'Cancelled'];
      const columns = {
        'Pending': document.getElementById('cards-Pending'),
        'Confirmed': document.getElementById('cards-Confirmed'),
        'In Progress': document.getElementById('cards-In-Progress'),
        'Completed': document.getElementById('cards-Completed'),
        'Cancelled': document.getElementById('cards-Cancelled')
      };
      
      const counts = {
        'Pending': document.getElementById('count-Pending'),
        'Confirmed': document.getElementById('count-Confirmed'),
        'In Progress': document.getElementById('count-In-Progress'),
        'Completed': document.getElementById('count-Completed'),
        'Cancelled': document.getElementById('count-Cancelled')
      };

      statuses.forEach(s => {
        if (columns[s]) columns[s].innerHTML = '';
        if (counts[s]) counts[s].textContent = '0';
      });

      const colCounts = { 'Pending': 0, 'Confirmed': 0, 'In Progress': 0, 'Completed': 0, 'Cancelled': 0 };

      filtered.forEach(b => {
        const statusKey = b.status || 'Pending';
        const colElement = columns[statusKey];
        if (colElement) {
          colElement.innerHTML += kanbanCardHTML(b);
          colCounts[statusKey]++;
        }
      });

      statuses.forEach(s => {
        if (counts[s]) counts[s].textContent = colCounts[s];
      });
    }

    async function assignTechInline(bookingId, techId) {
      if (!techId) return;
      
      const tech = techniciansCache.find(t => t.id === techId);
      if (!tech) return;

      try {
        await apiFetch(`/bookings/${bookingId}/assign`, {
          method: 'PATCH',
          body: JSON.stringify({ technician_id: techId })
        });
        
        const idx = bookingsCache.findIndex(b => b.id === bookingId);
        if (idx !== -1) {
          bookingsCache[idx].technician = tech;
          bookingsCache[idx].status = 'Confirmed';
        }
        
        filterAndRenderKanban();
        showToast(`✅ Technician "${tech.name}" assigned!`);
      } catch (e) {
        const idx = bookingsCache.findIndex(b => b.id === bookingId);
        if (idx !== -1) {
          bookingsCache[idx].technician = tech;
          bookingsCache[idx].status = 'Confirmed';
        }
        filterAndRenderKanban();
        showToast(`✅ Assigned (local fallback — API offline)`);
      }
    }

    async function updateStatusInline(bookingId, newStatus) {
      if (!newStatus) return;

      try {
        await apiFetch(`/bookings/${bookingId}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status: newStatus })
        });
        
        const idx = bookingsCache.findIndex(b => b.id === bookingId);
        if (idx !== -1) {
          bookingsCache[idx].status = newStatus;
        }
        
        filterAndRenderKanban();
        showToast(`✅ Status updated to "${newStatus}"`);
      } catch {
        const idx = bookingsCache.findIndex(b => b.id === bookingId);
        if (idx !== -1) {
          bookingsCache[idx].status = newStatus;
        }
        filterAndRenderKanban();
        showToast(`✅ Status updated (local fallback — API offline)`);
      }
    }

    function badgeHTML(status) {

    function buildPagination(total) {
      const pages = Math.ceil(total / PER_PAGE);
      const pb = document.getElementById('page-btns');
      if (!pb) return;
      let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})">‹</button>`;
      for (let i = 1; i <= Math.min(pages, 5); i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
      }
      html += `<button class="page-btn" onclick="goPage(${currentPage + 1})">›</button>`;
      pb.innerHTML = html;
    }

    function goPage(p) {
      const total = bookingsCache.length;
      const max = Math.ceil(total / PER_PAGE);
      currentPage = Math.max(1, Math.min(max, p));
      filterAndRenderTable();
    }

    async function saveStatus() {
      const newStatus = document.getElementById('modal-status')?.value;
      if (!newStatus || !currentBookingId) return;

      try {
        await apiFetch(`/bookings/${currentBookingId}/status`, {
          method: 'PATCH',
          body: JSON.stringify({ status: newStatus })
        });
        // Update cache
        const idx = bookingsCache.findIndex(b => b.id === currentBookingId);
        if (idx !== -1) bookingsCache[idx].status = newStatus;
        filterAndRenderTable();
        showToast(`✅ Status updated to "${newStatus}"`);
      } catch {
        // Update cache locally (offline mode)
        const idx = bookingsCache.findIndex(b => b.id === currentBookingId);
        if (idx !== -1) bookingsCache[idx].status = newStatus;
        filterAndRenderTable();
        showToast(`✅ Status updated (local only — API offline)`);
      }
      closeModal();
    }

    async function cancelBooking(ref, id) {
      showConfirm('Cancel Booking', `Are you sure you want to cancel booking ${ref}?`, async () => {
        try {
          await apiFetch(`/bookings/${id}`, { method: 'DELETE' });
        } catch { /* offline */ }
        const idx = bookingsCache.findIndex(b => b.id === id);
        if (idx !== -1) bookingsCache[idx].status = 'Cancelled';
        filterAndRenderTable();
        showToast('Booking cancelled.');
      });
    }

    async function submitTechnicianForm() {
      const id = document.getElementById('tech-edit-id').value;
      const name = document.getElementById('tech-name').value.trim();
      const phone = document.getElementById('tech-phone').value.trim();
      const email = document.getElementById('tech-email').value.trim();
      const specialization = document.getElementById('tech-specialization').value.trim();
      const area_pincode = document.getElementById('tech-pincode').value.trim();
      const rating = parseFloat(document.getElementById('tech-rating').value) || 5.0;
      const is_available = document.getElementById('tech-avail').value === "true";

      if (!name || !phone || !specialization || !area_pincode) {
        showToast('❌ Please fill in all required fields (*)');
        return;
      }

      const payload = { name, phone, email, specialization, area_pincode, rating, is_available };
      const method = id ? 'PATCH' : 'POST';
      const url = id ? `/technicians/${id}` : '/technicians';

      try {
        await apiFetch(url, {
          method: method,
          body: JSON.stringify(payload)
        });
        showToast(id ? '✅ Technician updated successfully!' : '✅ Technician added successfully!');
        renderTechnicians();
      } catch (e) {
        showToast('❌ Error: ' + e.message);
      }
    }

    async function switchSettingsTab(tabName) {
      document.querySelectorAll('.settings-tab').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.settings-section').forEach(sec => sec.classList.remove('active'));
      
      const activeBtn = document.getElementById(`tab-btn-${tabName}`);
      const activeSec = document.getElementById(`sec-${tabName}`);
      if (activeBtn) activeBtn.classList.add('active');
      if (activeSec) activeSec.classList.add('active');

      if (tabName === 'general') {
        await loadGeneralSettings();
      } else if (tabName === 'pincodes') {
        await loadServiceAreas();
      } else if (tabName === 'developer') {
        loadDeveloperSettings();
      }
    }

    async function loadGeneralSettings() {
      try {
        const res = await apiFetch('/settings');
        settingsCache = res.data || {};
      } catch (e) {
        settingsCache = {
          business_name: "Tekzivo Electronics Care",
          business_hours: "09:00 AM - 07:00 PM",
          support_phone: "+91 98765 43210",
          support_email: "support@tekzivo.com"
        };
      }
      
      document.getElementById('set-biz-name').value = settingsCache.business_name || '';
      document.getElementById('set-biz-hours').value = settingsCache.business_hours || '';
      document.getElementById('set-biz-phone').value = settingsCache.support_phone || '';
      document.getElementById('set-biz-email').value = settingsCache.support_email || '';
    }

    async function saveGeneralSettings(e) {
      if (e) e.preventDefault();
      
      const payload = {
        business_name: document.getElementById('set-biz-name').value.trim(),
        business_hours: document.getElementById('set-biz-hours').value.trim(),
        support_phone: document.getElementById('set-biz-phone').value.trim(),
        support_email: document.getElementById('set-biz-email').value.trim()
      };

      try {
        const res = await apiFetch('/settings', {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        settingsCache = res.data;
        showToast('✅ General settings saved successfully!');
      } catch (err) {
        settingsCache = payload;
        showToast('✅ Saved locally (API Offline)');
      }
    }

    async function loadServiceAreas() {
      const container = document.getElementById('pincodes-grid-container');
      if (container) container.innerHTML = '<div style="color:var(--muted)">Loading covered pincodes...</div>';

      try {
        const res = await apiFetch('/service-areas');
        serviceAreasCache = res.data || [];
      } catch (e) {
        serviceAreasCache = [];
      }

      renderPincodesList(serviceAreasCache);
    }

    function renderPincodesList(list) {
      const container = document.getElementById('pincodes-grid-container');
      if (!container) return;

      if (!list.length) {
        container.innerHTML = '<div style="color:var(--muted); grid-column: 1/-1; padding: 1.5rem; text-align:center;">No matching service areas found.</div>';
        return;
      }

      container.innerHTML = list.map(sa => `
        <div class="pincode-card" id="pincode-card-${sa.id}">
          <div class="pincode-card-info">
            <span class="pincode-card-code">${sa.pincode}</span>
            <span class="pincode-card-loc">${sa.city}, ${sa.state}</span>
          </div>
          <button class="btn-delete-pincode" onclick="deleteServiceArea('${sa.id}', '${sa.pincode}')" title="Remove Coverage">🗑️</button>
        </div>
      `).join('');
    }

    function filterServiceAreas(query) {
      const q = query.toLowerCase().trim();
      if (!q) {
        renderPincodesList(serviceAreasCache);
        return;
      }
      const filtered = serviceAreasCache.filter(sa => 
        sa.pincode.includes(q) || 
        sa.city.toLowerCase().includes(q) || 
        sa.state.toLowerCase().includes(q)
      );
      renderPincodesList(filtered);
    }

    async function addServiceArea(e) {
      if (e) e.preventDefault();

      const pincode = document.getElementById('pin-code').value.trim();
      const city = document.getElementById('pin-city').value.trim();
      const state = document.getElementById('pin-state').value.trim();

      if (!pincode || !city || !state) return;

      try {
        await apiFetch('/service-areas', {
          method: 'POST',
          body: JSON.stringify({ pincode, city, state })
        });
        showToast(`📍 Pincode "${pincode}" added successfully!`);
        
        // Reset inputs
        document.getElementById('pin-code').value = '';
        document.getElementById('pin-city').value = '';
        document.getElementById('pin-state').value = '';
        
        await loadServiceAreas();
      } catch (err) {
        // Fallback local addition
        const mockId = 'sa-mock-' + Math.random().toString(36).substr(2, 9);
        serviceAreasCache.push({ id: mockId, pincode, city, state });
        serviceAreasCache.sort((a,b) => a.pincode.localeCompare(b.pincode));
        renderPincodesList(serviceAreasCache);
        
        document.getElementById('pin-code').value = '';
        document.getElementById('pin-city').value = '';
        document.getElementById('pin-state').value = '';
        showToast('📍 Saved locally (API Offline)');
      }
    }

    async function deleteServiceArea(areaId, pincode) {
      showConfirm('Remove Service Area', `Are you sure you want to remove repair service coverage for pincode "${pincode}"?`, async () => {
        try {
          await apiFetch(`/service-areas/${areaId}`, { method: 'DELETE' });
          showToast(`🗑️ Coverage for pincode "${pincode}" removed.`);
          await loadServiceAreas();
        } catch (err) {
          const idx = serviceAreasCache.findIndex(sa => sa.id === areaId);
          if (idx !== -1) {
            serviceAreasCache.splice(idx, 1);
          }
          renderPincodesList(serviceAreasCache);
          showToast('🗑️ Removed locally (API Offline)');
        }
      });
    }

    function loadDeveloperSettings() {
      const localBaseUrl = localStorage.getItem('TEKZIVO_API_BASE') || getApiBase();
      const localTheme = localStorage.getItem('TEKZIVO_THEME') || 'light';
      
      document.getElementById('dev-api-url').value = localBaseUrl;
      document.getElementById('dev-theme').value = localTheme;
    }

    function saveDeveloperSettings(e) {
      if (e) e.preventDefault();

      const newUrl = document.getElementById('dev-api-url').value.trim();
      const newTheme = document.getElementById('dev-theme').value;

      localStorage.setItem('TEKZIVO_API_BASE', newUrl);
      localStorage.setItem('TEKZIVO_THEME', newTheme);
      
      // Apply theme class instantly for immediate UI response
      if (newTheme === 'dark') {
        document.documentElement.classList.add('dark-theme');
        document.body.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
        document.body.classList.remove('dark-theme');
      }
      
      showToast('⚙️ Developer settings applied! Reloading...');
      setTimeout(() => {
        window.location.reload();
      }, 1000);
    }

      showConfirm('Reset and Seed Database', 'This will wipe custom brands/models modifications and seed standard test values. Are you sure you want to proceed?', async () => {
        try {
          showToast('🛠️ Database reset triggered. Resetting cache...');
          localStorage.clear();
          setTimeout(() => { window.location.reload(); }, 1000);
        } catch (e) {
          showToast('❌ Reset failed: ' + e.message);
        }
      });
    }

    // ─── SECTION ROUTER ───────────────────────
    function loadSection(section, el) {
      currentSection = section;
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      if (el) el.classList.add('active');

      // Close mobile sidebar if open
      const sidebar = document.querySelector('.sidebar');
      if (sidebar && sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
        const overlay = document.querySelector('.sidebar-overlay');
        if (overlay) overlay.classList.remove('active');
      }
      currentPage = 1;
      if (section === 'dashboard') renderDashboard();
      if (section === 'bookings') { renderBookingsKanban(); }
      if (section === 'technicians') renderTechnicians();
      if (section === 'customers') renderCustomers();
      if (section === 'brands') renderBrands();
      if (section === 'services') renderServices();
      if (section === 'accessories') renderAccessories();
      if (section === 'settings') renderSettings();
    }

    function refreshData() { loadSection(currentSection, null); }

    // ─── HELPERS ──────────────────────────────
    function skeletonRows(n) {
      return Array(n).fill('').map(() => `<tr class="skeleton-row">
    <td><div class="skeleton" style="height:14px;width:110px"></div></td>
    <td><div class="skeleton" style="height:14px;width:130px"></div></td>
    <td><div class="skeleton" style="height:14px;width:100px"></div></td>
    <td><div class="skeleton" style="height:14px;width:80px"></div></td>
    <td><div class="skeleton" style="height:14px;width:90px"></div></td>
    <td><div class="skeleton" style="height:14px;width:60px"></div></td>
    <td><div class="skeleton" style="height:20px;width:80px;border-radius:20px"></div></td>
    <td><div class="skeleton" style="height:24px;width:60px;border-radius:6px"></div></td>
  </tr>`).join('');
    }

    function buildDailyChart(daily) {
      if (!daily?.length) return '<div style="color:var(--muted);font-size:0.8rem">No data</div>';
      const max = Math.max(...daily.map(d => d.count), 1);
      return daily.map(d => `
    <div class="chart-bar-col">
      <div class="chart-bar" style="height:${Math.round((d.count / max) * 76)}px" title="${d.count} bookings"></div>
      <div class="chart-label">${new Date(d.date + 'T00:00:00').toLocaleDateString('en', { weekday: 'short' })}</div>
    </div>`).join('');
    }

    function buildTechList(techs) {
      if (!techs?.length) return '<div style="color:var(--muted);font-size:0.8rem;padding:0.5rem">No data — connect API</div>';
      return techs.map(t => `
    <div class="tech-row">
      <div class="tech-av" style="background:${colorFor(t.name)}">${initials(t.name)}</div>
      <div class="tech-info"><div class="tech-name">${t.name}</div><div class="tech-spec">${t.specialization}</div></div>
      <div><div class="tech-jobs-num">${t.total_jobs}</div><div class="tech-jobs-lbl">jobs</div></div>
    </div>`).join('');
    }

    function exportCSV() {
      const rows = [['Booking Ref', 'Customer', 'Phone', 'Device', 'Service', 'Date', 'Slot', 'Amount', 'Status']];
      bookingsCache.forEach(b => rows.push([
        b.booking_ref,
        b.customer?.name || '', b.customer?.phone || '',
        b.service?.device_type || '', b.service?.name || '',
        b.preferred_date || '', b.time_slot || '',
        b.estimated_price || '', b.status
      ]));
      const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
      const a = document.createElement('a');
      a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = `tekzivo-bookings-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      showToast('📄 CSV exported!');
    }

    function getDemoData() {
      return [];
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function showConfirm(title, message, onYes, onNo) {
      let overlay = document.querySelector('.confirm-overlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.className = 'confirm-overlay';
        overlay.innerHTML = `
          <div class="confirm-box">
            <div class="confirm-title" id="conf-title">Confirm Action</div>
            <div class="confirm-message" id="conf-msg">Are you sure?</div>
            <div class="confirm-actions">
              <button class="btn-confirm-no" id="conf-btn-no">Cancel</button>
              <button class="btn-confirm-yes" id="conf-btn-yes">Yes, Proceed</button>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
      }
      
      document.getElementById('conf-title').textContent = title;
      document.getElementById('conf-msg').textContent = message;
      overlay.classList.add('active');

      const btnYes = document.getElementById('conf-btn-yes');
      const btnNo = document.getElementById('conf-btn-no');

      const newYes = btnYes.cloneNode(true);
      const newNo = btnNo.cloneNode(true);
      btnYes.parentNode.replaceChild(newYes, btnYes);
      btnNo.parentNode.replaceChild(newNo, btnNo);

      newYes.addEventListener('click', () => {
        overlay.classList.remove('active');
        if (onYes) onYes();
      });

      newNo.addEventListener('click', () => {
        overlay.classList.remove('active');
        if (onNo) onNo();
      });
    }

    function updateTimestamp() {
      const el = document.getElementById('last-updated');
      if (el) el.textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN');
    }

    async function loadTechniciansCache() {
      try {
        const res = await apiFetch('/technicians');
        techniciansCache = res.data || [];
      } catch {
        techniciansCache = [];
      }
    }

    document.getElementById('booking-modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    function toggleSidebar() {
      const sidebar = document.querySelector('.sidebar');
      const overlay = document.querySelector('.sidebar-overlay') || createSidebarOverlay();
      sidebar.classList.toggle('open');
      overlay.classList.toggle('active');
    }

    function createSidebarOverlay() {
      const overlay = document.createElement('div');
      overlay.className = 'sidebar-overlay';
      overlay.onclick = () => {
        document.querySelector('.sidebar').classList.remove('open');
        overlay.classList.remove('active');
      };
      document.body.appendChild(overlay);
      return overlay;
    }

    // ─── INIT ─────────────────────────────────
    (async function () {
      // Redundant theme fallback to ensure class is applied after DOM is fully parsed
      const currentTheme = localStorage.getItem('TEKZIVO_THEME') || 'light';
      if (currentTheme === 'dark') {
        document.documentElement.classList.add('dark-theme');
        document.body.classList.add('dark-theme');
      } else {
        document.documentElement.classList.remove('dark-theme');
        document.body.classList.remove('dark-theme');
      }

      // Try fast bootstrap first
      try {
        const res = await apiFetch('/admin/bootstrap');
        if (res && res.success && res.data) {
          const data = res.data;
          updateApiStatusBadge('online');
          
          techniciansCache = data.technicians || [];
          statsCache = data.stats || {};
          bookingsCache = data.bookings || [];
          
          const pb = document.getElementById('pending-badge');
          if (pb) pb.textContent = statsCache.totals?.pending || '0';
          
          await renderDashboard(true);
        } else {
          throw new Error("Invalid bootstrap data");
        }
      } catch (e) {
        console.warn("Combined admin bootstrap failed, falling back to legacy sequential fetches...", e);
        await checkApiHealth();
        await loadTechniciansCache();
        await renderDashboard();
      }

      // Auto-refresh every 60 seconds (non-blocking)
      setInterval(async () => {
        const healthy = await checkApiHealth();
        if (healthy && (currentSection === 'dashboard' || currentSection === 'bookings')) {
          try {
            const statsRes = await apiFetch('/dashboard/stats');
            if (statsRes.success) {
              statsCache = statsRes.data;
              const pb = document.getElementById('pending-badge');
              if (pb) pb.textContent = statsCache.totals?.pending || '0';
            }
          } catch (err) { console.error(err); }
          loadBookings();
        }
      }, 60000);
    })();
  </script>
</body>
